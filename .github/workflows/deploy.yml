# Mirror this GitHub repo to a Hugging Face Spaces git remote on every push
# to `main`. HF rebuilds the Docker image automatically on push (~2 min).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   HF_TOKEN  — Hugging Face write-scoped access token
#   HF_USER   — your Hugging Face username (e.g. "mosman")
#   HF_SPACE  — your Space name (e.g. "banner-capture")
#
# After the first successful push, the live URL is:
#   https://<HF_USER>-<HF_SPACE>.hf.space

name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so HF git accepts the push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER:  ${{ secrets.HF_USER }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ] || [ -z "${HF_USER:-}" ] || [ -z "${HF_SPACE:-}" ]; then
            echo "Missing required secrets: HF_TOKEN, HF_USER, HF_SPACE" >&2
            exit 1
          fi
          # Configure git so the push has a valid author
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use force-with-lease equivalent — Spaces git accepts force pushes
          # because we treat GitHub as the source of truth.
          git push --force "https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/$HF_SPACE" \
            "HEAD:refs/heads/main"
